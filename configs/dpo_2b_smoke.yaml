# DPO smoke (TRL DPOTrainer). model_name_or_path + output_dir are set by the orchestrator.
trainer: dpo
data:
  datasets:
    - { path: openeurollm/Dolci-Instruct-DPO-translated, split: "train[:2000]" }   # smoke slice
dpo:
  beta: 0.1
  max_steps: 20                 # SMOKE; remove for real run
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-7
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  max_length: 8192
  bf16: true
  gradient_checkpointing: true
save: { save_steps: 20, save_only_model: true }
