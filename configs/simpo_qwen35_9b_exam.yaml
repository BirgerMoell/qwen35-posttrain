# SimPO (reference-free) on EU exam preference pairs — clean {prompt,chosen,rejected} strings.
# Replaces the Dolci-DPO SimPO attempt that failed on conversational data. One model, no OOM.

# ── ModelConfig ── (STAGE_LOAD overrides to the SFT checkpoint)
model_name_or_path: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-sft
torch_dtype: bfloat16

# ── DatasetMixtureConfig (parquet) ──
datasets:
  - path: parquet
    data_files:
      train: /scratch/project_465002530/users/bmoell/posttrain-data/exam-dpo-parquet/train.parquet
    split: train

# ── CPOConfig (SimPO mode) ──
output_dir: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-simpo-exam
loss_type: simpo
cpo_alpha: 0.0
simpo_gamma: 0.5
beta: 2.0
max_length: 1024
max_prompt_length: 768
max_steps: 500
dataset_num_proc: 8
ddp_timeout: 10800
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
logging_steps: 10
save_steps: 100
save_total_limit: 3
report_to: none
