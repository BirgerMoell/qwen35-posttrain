# GRPO/RLVR smoke (TRL GRPOTrainer or veRL). model + output set by orchestrator.
# NOTE: needs vLLM (ROCm) rollouts — validate on MI250X before scaling. veRL is the scale path.
trainer: grpo
data:
  datasets:
    - { path: allenai/RLVR-GSM-MATH-IF-Mixed-Constraints, split: "train[:1000]" }   # verifiable prompts
reward:
  verifiers: [math_answer, ifeval_constraints]   # checkable rewards; add code-tests later
grpo:
  num_generations: 8            # group size for GRPO advantage
  max_steps: 10                 # SMOKE
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-6
  max_prompt_length: 2048
  max_completion_length: 4096
  bf16: true
  use_vllm: true                # rollouts via vLLM (ROCm)
save: { save_steps: 10, save_only_model: true }
