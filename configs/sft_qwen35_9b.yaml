# Real SFT — Qwen3.5-9B on the OELLM EU multilingual mix (tulu3-euroblocks-85-15)
# Data: 161k EuroBlocks (EU multilingual) + 920k tulu3-commercial (English replay)
# = ~1.08M examples, 85/15 EU/English. English replay guards against forgetting.
# Full fine-tuning, FSDP ZeRO-3 (TRANSFORMER_BASED_WRAP), bf16.

# ── ModelConfig ──
model_name_or_path: /scratch/project_465002530/users/bmoell/models/Qwen3.5-9B
torch_dtype: bfloat16

# ── DatasetMixtureConfig ──
# Parquet (not JSON): memory-mapped, so the 8 FSDP ranks share OS page cache instead of
# each parsing the full 1.08M-example JSONL into Arrow (~8x RAM -> node OOM).
# Pre-converted once from euroblocks.jsonl + tulu3-commercial.jsonl.
datasets:
  - path: parquet
    data_files:
      train: /scratch/project_465002530/users/bmoell/posttrain-data/qwen35-9b-sft-parquet/train.parquet
    split: "train[:400000]"   # first real run: 400k of 1.08M (derisk memory); scale up after

# ── SFTConfig ──
output_dir: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-sft
max_length: 4096              # 8192 OOM'd the GCD; 4096 fits and covers most instruction data
packing: true
dataset_num_proc: 8           # modest parallelism — too many workers buffer too much and OOM
ddp_timeout: 10800            # 3h — preprocessing must finish before the NCCL setup barrier
num_train_epochs: 1
max_steps: 200                # cap first real run (~epoch 0.47); SFT gains land early
per_device_train_batch_size: 1
gradient_accumulation_steps: 16     # global batch = 1 x 8 GCDs x 16 = 128
learning_rate: 1.0e-5               # Qwen is LR-sensitive; 1e-5 for full FT
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
bf16: true
gradient_checkpointing: true
logging_steps: 10
save_steps: 100               # checkpoint at 100/200 — don't risk a slow run with only a final save
save_total_limit: 3
report_to: none
