# SFT smoke — Gemma-4-E2B-it on Dolci multilingual SFT data
# Flat TRL schema: ModelConfig + DatasetMixtureConfig + SFTConfig at top level
# 20 steps to validate the TRL + Gemma 4 + LUMI stack

# ── ModelConfig ──
model_name_or_path: /scratch/project_465002530/users/bmoell/models/gemma-4-E2B-it
torch_dtype: bfloat16

# ── DatasetMixtureConfig (top-level `datasets` list) ──
datasets:
  - path: json
    data_files:
      train: /scratch/project_462000963/datasets/posttraining_data/SFTTrainer_format/multiling/europa_oasst2/train.jsonl
    split: train

# ── SFTConfig ──
output_dir: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/gemma4-2b-smoke
max_length: 4096
packing: false
max_steps: 20
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
logging_steps: 1
save_steps: 20
save_only_model: true
report_to: none
