# DPO smoke — Qwen3.5-2B on Swedish DPO preference data
# Validates the DPO stage on a simpler architecture than Gemma 4 E-series.
# Flat TRL schema: ModelConfig + DatasetMixtureConfig + DPOConfig at top level

# ── ModelConfig ──
model_name_or_path: /scratch/project_465002530/users/bmoell/models/Qwen3.5-2B
torch_dtype: bfloat16

# ── DatasetMixtureConfig ──
datasets:
  - path: json
    data_files:
      train: /scratch/project_462000963/datasets/posttraining_data/DPOTrainer_format/swe/nvidia/HelpSteer3-general-translated/train.jsonl
    split: train

# ── DPOConfig ──
output_dir: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-2b-dpo-smoke
max_length: 2048
max_prompt_length: 1024
beta: 0.1
max_steps: 20
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_steps: 2
bf16: true
gradient_checkpointing: true
logging_steps: 1
save_steps: 20
save_only_model: true
report_to: none
