# Accelerate FSDP config for LUMI (8 GCDs/node). Skeleton — tune for the chosen size.
compute_environment: LOCAL_MACHINE
distributed_type: FSDP
mixed_precision: bf16
num_processes: 8                 # per node; multiply by nodes
fsdp_config:
  fsdp_sharding_strategy: FULL_SHARD
  # SIZE_BASED_WRAP is architecture-agnostic — avoids the per-model transformer layer
  # class lookup that breaks on text-only checkpoints extracted from multimodal models
  # (e.g. Gemma4ForCausalLM still lists Gemma4VisionEncoderLayer in _no_split_modules).
  fsdp_auto_wrap_policy: SIZE_BASED_WRAP
  fsdp_min_num_params: 100000000
  fsdp_state_dict_type: FULL_STATE_DICT   # consolidated ckpt; compatible with save_only_model
  fsdp_use_orig_params: true
  fsdp_offload_params: false
# For 9B+ consider ZeRO-3 (DeepSpeed) instead; for GRPO, veRL manages its own engine.
