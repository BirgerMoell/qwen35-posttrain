# Accelerate FSDP config for LUMI (8 GCDs/node). Skeleton — tune for the chosen size.
compute_environment: LOCAL_MACHINE
distributed_type: FSDP
mixed_precision: bf16
num_processes: 8                 # per node; multiply by nodes
fsdp_config:
  fsdp_sharding_strategy: FULL_SHARD
  # TRANSFORMER_BASED_WRAP: wraps decoder layers, leaves embeddings/lm_head at the root
  # so tied-embedding matmuls stay intact. (SIZE_BASED_WRAP wraps embeddings as standalone
  # FSDP units and breaks the matmul: "size mismatch ... vec (...)".)
  # Works for standard causal LMs (Qwen3.5, Gemma SFT). The Gemma-4 E-series text-only
  # DPO path is a separate, deprioritized case (elastic/MatFormer architecture).
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_state_dict_type: FULL_STATE_DICT   # consolidated ckpt; compatible with save_only_model
  fsdp_use_orig_params: true
  fsdp_offload_params: false
  # Large-model loading: only rank 0 loads weights to CPU, then broadcasts to other ranks.
  # Without this each of the 8 ranks loads a full 9B copy to CPU (~144 GB) and OOMs the node.
  fsdp_cpu_ram_efficient_loading: true
  fsdp_sync_module_states: true
# For 9B+ consider ZeRO-3 (DeepSpeed) instead; for GRPO, veRL manages its own engine.
