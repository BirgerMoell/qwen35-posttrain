# Run #2 — Reasoning SFT for Qwen3.5-9B (distilled reasoning, no generation needed)
# Data: Nemotron-v2 math (EN reasoning) + Finnish DeepSeek-distilled math (EU reasoning),
# both already DeepSeek-R1/V3 distilled. Built by scripts/build_run2_data.py.
# This is the "Stage 0b reasoning SFT" — run BEFORE general SFT, or as a separate variant.

# ── ModelConfig ──
model_name_or_path: /scratch/project_465002530/users/bmoell/models/Qwen3.5-9B
torch_dtype: bfloat16

# ── DatasetMixtureConfig (parquet, memory-mapped) ──
datasets:
  - path: parquet
    data_files:
      train: /scratch/project_465002530/users/bmoell/posttrain-data/qwen35-9b-reasoning-sft-parquet/train.parquet
    split: train

# ── SFTConfig ──
output_dir: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-reasoning-sft
max_length: 8192              # reasoning traces are long — more room than general SFT
packing: true
dataset_num_proc: 8
ddp_timeout: 10800
max_steps: 300
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.0
bf16: true
gradient_checkpointing: true
logging_steps: 10
save_steps: 100
save_total_limit: 3
report_to: none
