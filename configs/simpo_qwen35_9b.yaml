# SimPO (reference-free preference optimization) — Qwen3.5-9B. Replaces DPO: one model, no OOM.
# Loss via TRL CPOConfig: loss_type=simpo + simpo_gamma. Same {prompt,chosen,rejected} data.

# ── ModelConfig ── (STAGE_LOAD overrides to the SFT checkpoint)
model_name_or_path: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-sft
torch_dtype: bfloat16

# ── DatasetMixtureConfig (parquet, memory-mapped) ──
datasets:
  - path: parquet
    data_files:
      train: /scratch/project_465002530/users/bmoell/posttrain-data/qwen35-9b-dpo-parquet/train.parquet
    split: train

# ── CPOConfig (SimPO mode) ──
output_dir: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-simpo
loss_type: simpo
cpo_alpha: 0.0                # pure SimPO (no CPO/SFT term); raise for CPO-SimPO hybrid
simpo_gamma: 0.5             # target reward margin
beta: 2.0
max_length: 4096
max_prompt_length: 2048
max_steps: 500
dataset_num_proc: 8
ddp_timeout: 10800
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
logging_steps: 10
save_steps: 100
save_total_limit: 3
report_to: none
