# Real DPO — Qwen3.5-9B on Dolci-Instruct-DPO (260k preference pairs)
# Loads the SFT checkpoint as both policy and reference model.
# Uses scripts/dpo_train.py (text-only entrypoint, prunes phantom vision classes).

# ── ModelConfig ──
# STAGE_LOAD is overridden by the orchestrator to point at the SFT output.
model_name_or_path: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-sft
torch_dtype: bfloat16

# ── DatasetMixtureConfig ──
# Parquet (memory-mapped) — JSONL parsing OOM'd the node (8 ranks x 260k pairs). Pre-converted.
datasets:
  - path: parquet
    data_files:
      train: /scratch/project_465002530/users/bmoell/posttrain-data/qwen35-9b-dpo-parquet/train.parquet
    split: train

# ── DPOConfig ──
output_dir: /scratch/project_465002530/users/bmoell/qwen35-posttrain/output/qwen35-9b-dpo
max_length: 4096
max_prompt_length: 2048
beta: 0.1
max_steps: 500                # cap first DPO run; preference tuning converges fast
dataset_num_proc: 8
ddp_timeout: 10800
per_device_train_batch_size: 1
gradient_accumulation_steps: 8      # global batch = 1 x 8 GCDs x 8 = 64
learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true
logging_steps: 10
save_steps: 100
save_total_limit: 3
report_to: none
